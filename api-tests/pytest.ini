[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
markers =
    smoke: quick smoke tests
    sepa: SEPA Direct Debit tests
    mandate: mandate registration tests
    direct_debit: direct debit initiation tests
    settlement: settlement tests